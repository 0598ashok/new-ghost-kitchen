<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/images/ui/brand-icon.svg">
    <meta http-equiv="refresh" content="0; url=pages/index.html">
    <title>Ghost Kitchen | Redirecting...</title>
    <style>
        :root {
            --primary: #e11d48;
            --bg: #111827;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .splash-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-family: 'Outfit', system-ui, sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
        }
        .splash-logo img {
            width: 2rem;
            height: 2rem;
            flex-shrink: 0;
        }
        .splash-logo strong {
            color: var(--primary);
            font-weight: 800;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(225, 29, 72, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            animation: spin 0.8s linear infinite;
        }

        .text {
            font-size: 0.9rem;
            opacity: 0.6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="splash-logo"><img src="assets/images/ui/brand-icon.svg" alt="" aria-hidden="true"> Ghost <strong>Kitchen</strong></div>
        <div class="spinner"></div>
        <div class="text">Redirecting to Premium Experience</div>
    </div>

    <script>
        // Immediate redirection for maximum speed
        window.location.replace("pages/index.html");
    </script>
</body>
</html>
