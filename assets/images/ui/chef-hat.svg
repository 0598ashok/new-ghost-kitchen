<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!--
    Ghost Kitchen — Chef Hat (Toque Blanche) Icon
    Three overlapping dome circles + cylindrical body + band + brim
  -->
  <!-- Left dome puff -->
  <circle cx="7.5" cy="10" r="3.5"/>
  <!-- Centre dome puff (tallest) -->
  <circle cx="12" cy="7" r="5"/>
  <!-- Right dome puff -->
  <circle cx="16.5" cy="10" r="3.5"/>
  <!-- Hat body -->
  <rect x="7" y="12" width="10" height="3"/>
  <!-- Band -->
  <rect x="6" y="15.5" width="12" height="2" rx="0.5"/>
  <!-- Brim -->
  <rect x="4.5" y="18" width="15" height="2.5" rx="1.25"/>
</svg>
