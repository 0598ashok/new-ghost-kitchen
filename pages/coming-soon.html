    <script>
        (function () {
            const dir = localStorage.getItem('dir') || 'ltr';
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.dir = dir;

        })();

    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #2d3436;
            color: white;
            overflow: hidden;
        }

        .hero-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            z-index: -1;
        }

        .countdown {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin: 3rem 0;
        }

        .count-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 120px;
        }

        .count-num {
            font-size: 3rem;
            font-weight: 800;
            display: block;

        .count-label {

            <div class="count-box"><span class="count-num">45</span><span class="count-label">Mins</span></div>

        <form style="max-width: 500px; margin: 0 auto; display: flex; gap: 1rem;">

    </div>
