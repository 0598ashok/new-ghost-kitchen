<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Ghost Kitchen</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <script>
        (function() {
            const dir = localStorage.getItem('dir') || 'ltr';
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.dir = dir;
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: #2d3436; color: white; overflow: hidden; }
        .hero-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: -1; }
        .countdown { display: flex; gap: 2rem; justify-content: center; margin: 3rem 0; }
        .count-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 2rem; border-radius: 20px; min-width: 120px; }
        .count-num { font-size: 3rem; font-weight: 800; display: block; }
        .count-label { font-size: 0.8rem; text-transform: uppercase; opacity: 0.7; }
    </style>
</head>
<body>
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1200&auto=format&fit=crop" class="hero-img" alt="Coming Soon Background">
    
    <div class="container">
        <h1 style="font-size: 4rem; margin-bottom: 1rem;">Coming <span style="color: var(--primary-color)">Deliciously</span> Soon</h1>
        <p style="font-size: 1.2rem; opacity: 0.8;">Our new cloud kitchen concept is almost ready to serve you.</p>
        
        <div class="countdown">
            <div class="count-box"><span class="count-num">12</span><span class="count-label">Days</span></div>
            <div class="count-box"><span class="count-num">08</span><span class="count-label">Hours</span></div>
            <div class="count-box"><span class="count-num">45</span><span class="count-label">Mins</span></div>
        </div>
        
        <form style="max-width: 500px; margin: 0 auto; display: flex; gap: 1rem;">
            <input type="email" placeholder="Get notified on launch" style="flex: 1; padding: 1.2rem; border-radius: 50px; border: none; outline: none; background: rgba(255,255,255,0.9); color: #333;">
            <button class="btn btn-primary" style="padding: 1.2rem 2.5rem; border-radius: 50px;">Join Waitlist</button>
        </form>
    </div>
</body>
</html>
