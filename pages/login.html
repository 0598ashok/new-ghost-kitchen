<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/images/ui/brand-icon.svg">
    <title>Login | Ghost Kitchen - Experience Elite Dining</title>
    <meta name="description" content="Access your Ghost Kitchen account to order gourmet meals and explore elite dining offerings.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Core Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">

    <!-- Navbar & Footer Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/navbar-v4.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">

    <script>
        (function () {
            const dir = localStorage.getItem('dir') || 'ltr';
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.dir = dir;
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 80px;
            background: var(--bg-color);
            position: relative;
            overflow: hidden;
            transition: padding 0.3s;
        }

        /* Abstract Glows */
        .login-glow {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: var(--primary-color);
            filter: blur(150px);
            opacity: 0.05;
            border-radius: 50%;
            z-index: 0;
        }

        .glow-1 { top: -10%; right: -10%; }
        .glow-2 { bottom: -10%; left: -10%; }

        .login-container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 36px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        [data-theme="dark"] .login-container {
            border-color: var(--border-dark);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        .login-visual {
            position: relative;
            background: #111;
        }

        .login-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: transform 10s ease-in-out;
        }

        .login-visual:hover img {
            transform: scale(1.1);
        }

        .visual-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            color: #fff;
        }

        .login-form-area {
            padding: clamp(2rem, 5vw, 5rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 2.5rem;
        }

        .form-header h2 {
            font-size: clamp(2rem, 4vw, 2.5rem);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .form-header p {
            opacity: 0.6;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 1.1rem 1.4rem;
            background: rgba(128, 128, 128, 0.04);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            color: var(--text-color);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        [data-theme="dark"] .input-group input {
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
        }

        /* Password Toggle */
        .password-field-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 1.4rem;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
            z-index: 10;
        }

        [dir="rtl"] .password-toggle {
            right: auto;
            left: 1.4rem;
        }

        .password-toggle:hover { opacity: 1; }

        .input-group input:focus {
            border-color: var(--primary-color);
            background: var(--bg-color);
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.08);
            outline: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .forgot-pass {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-login {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(225, 29, 72, 0.2);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(225, 29, 72, 0.3);
        }

        .social-login {
            margin-top: 3rem;
            text-align: center;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.3;
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--text-color);
        }

        .social-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .social-btn {
            padding: 0.8rem;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            background: transparent;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .social-btn:hover {
            background: rgba(128, 128, 128, 0.05);
            border-color: var(--primary-color);
        }

        /* Minimal Auth Header */
        .auth-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: transparent;
            width: 100%;
            transition: padding 0.3s;
        }

        /* Essential Reset for global ID conflicts */
        #main-header.auth-header {
            left: 0 !important;
            right: 0 !important;
            transform: none !important;
            width: 100% !important;
            max-width: 100% !important;
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
            height: auto !important;
            top: 0 !important;
            padding: 1.5rem 2rem !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .auth-logo img {
            width: 1.8rem;
            height: 1.8rem;
        }

        .auth-utils {
            display: flex;
            gap: 1rem;
        }

        .auth-util-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s;
        }

        [data-theme="dark"] .auth-util-icon {
            border-color: var(--border-dark);
        }

        .auth-util-icon:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* RESPONSIVENESS */
        @media (max-width: 1024px) {
            .login-container { max-width: 900px; }
        }

        @media (max-width: 900px) {
            .login-container {
                grid-template-columns: 1fr;
                max-width: 550px;
                border-radius: 24px;
            }
            .login-visual { display: none; }
            .login-wrapper { padding: 100px 20px 40px; }
            .login-form-area { padding: 3rem 2rem; }
        }

        @media (max-width: 600px) {
            .auth-header { padding: 1rem !important; }
            .auth-logo span { display: none; } /* Hide text on small screens */
            .social-btns { grid-template-columns: 1fr; }
            .login-container { border-radius: 20px; }
            .login-form-area { padding: 2.5rem 1.5rem; }
            .form-header h2 { font-size: 1.8rem; }
            .btn-login { padding: 1rem; font-size: 0.95rem; }
        }

        @media (max-height: 700px) {
            .login-wrapper { align-items: flex-start; }
            .login-container { margin-top: 2rem; }
        }
    </style>
</head>

<body data-theme="light">
    <header id="main-header" class="auth-header">
        <a href="../index.html" class="auth-logo">
            <img src="../assets/images/ui/brand-icon.svg" alt="">
            <span>Ghost <strong>Kitchen</strong></span>
        </a>
        <div class="auth-utils">
            <div class="auth-util-icon" id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></div>
            <div class="auth-util-icon dir-toggle" id="dir-toggle" title="Toggle Direction"></div>
        </div>
    </header>

    <main class="login-wrapper">
        <div class="login-glow glow-1"></div>
        <div class="login-glow glow-2"></div>

        <section class="login-container">
            <div class="login-visual">
                <img src="../assets/images/hero/kitchen_main.png" alt="Ghost Kitchen Ambiance">
                <div class="visual-overlay">
                    <h3 style="font-size: 2rem; margin-bottom: 1rem;">Unbox Excellence.</h3>
                    <p style="opacity: 0.8; line-height: 1.6;">Join our community of foodies and experience the next generation of cloud dining.</p>
                </div>
            </div>

            <div class="login-form-area">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Enter your credentials to access your kitchen.</p>
                </div>

                <form>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="julian@ghostkitchen.io" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-field-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="fas fa-eye-slash password-toggle" onclick="togglePasswordVisibility('password', this)"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span>Remember Me</span>
                        </label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-login">Login to Kitchen</button>

                    <div class="social-login">
                        <div class="social-divider">
                            <span>Or continue with</span>
                        </div>
                        <div class="social-btns">
                            <button type="button" class="social-btn">
                                <i class="fab fa-google"></i> Google
                            </button>
                            <button type="button" class="social-btn">
                                <i class="fab fa-apple"></i> Apple
                            </button>
                            <button type="button" class="social-btn">
                                <i class="fab fa-facebook-f"></i> Facebook
                            </button>
                        </div>
                    </div>

                    <p style="text-align: center; margin-top: 2.5rem; font-size: 0.95rem; opacity: 0.7;">
                        Don't have an account? <a href="signup.html" style="color: var(--primary-color); font-weight: 700; text-decoration: none;">Create Account</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/navbar-v4.js"></script>
</body>

</html>
